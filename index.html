<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root{
    --navy:#1F3864; --navy-light:#2E4D7A; --accent:#2E75B6; --accent-light:#E8F1FA;
    --bg:#F4F6F9; --card:#FFFFFF; --border:#DCE3EB; --text:#1A2433; --muted:#5B6B7F;
    --green:#1D9E75; --green-bg:#E1F5EE; --amber:#BA7517; --amber-bg:#FAEEDA;
    --red:#A32D2D; --red-bg:#FCEBEB; --radius:10px; --radius-lg:14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5;}
  #app{min-height:100vh;}
  a{color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .login-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:40px; width:100%; max-width:400px; box-shadow:0 2px 16px rgba(20,30,50,0.06);}
  .login-logo{max-width:120px; width:100%; height:auto; margin:0 auto 18px; display:block;}
  .login-logo img{display:block; width:100%; height:auto;}
  .login-card h1{font-size:20px; font-weight:700; color:var(--navy); margin-bottom:4px;}
  .login-card .sub{color:var(--muted); font-size:13px; margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em;}
  .field select, .field input{width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff;}
  .field select:focus, .field input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light);}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border-radius:8px; border:none; font-size:14px; font-weight:600; transition:opacity .15s;}
  .btn:hover{opacity:.9;}
  .btn-primary{background:var(--navy); color:#fff; width:100%; padding:12px;}
  .btn-danger{background:var(--red); color:#fff;}
  .btn-secondary{background:#fff; border:1px solid var(--border); color:var(--text);}
  .btn-sm{padding:6px 12px; font-size:13px; width:auto;}
  .login-note{margin-top:18px; font-size:11px; color:var(--muted); text-align:center; line-height:1.5;}
  .role-toggle{display:flex; gap:8px; margin-bottom:18px;}
  .role-btn{flex:1; padding:9px; border-radius:8px; border:1px solid var(--border); background:#fff; font-size:13px; font-weight:600; color:var(--muted);}
  .role-btn.active{background:var(--navy); color:#fff; border-color:var(--navy);}
  .error-text{color:var(--red); font-size:12px; margin-top:-6px; margin-bottom:10px;}

  .topbar{background:var(--navy); color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;}
  .topbar-left{display:flex; align-items:center; gap:10px;}
  .topbar-logo{width:30px; height:auto; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .topbar-logo img{width:100%; height:auto; display:block;}
  .topbar-title{font-size:14px; font-weight:600;}
  .topbar-title span{opacity:.65; font-weight:400; margin-left:8px;}
  .topbar-right{display:flex; align-items:center; gap:14px; font-size:13px;}
  .topbar-right .who{opacity:.85;}
  .logout-link{background:rgba(255,255,255,0.12); border:none; color:#fff; padding:7px 13px; border-radius:7px; font-size:13px;}

  .container{max-width:1100px; margin:0 auto; padding:28px 24px 60px;}
  .page-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:22px; flex-wrap:wrap; gap:12px;}
  .page-head h2{font-size:22px; font-weight:700; color:var(--navy);}
  .page-head .desc{color:var(--muted); font-size:13px; margin-top:3px;}

  .stats-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:26px;}
  .stat-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px;}
  .stat-card .label{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; font-weight:600;}
  .stat-card .value{font-size:26px; font-weight:700; color:var(--navy); margin-top:4px;}
  .stat-card .value.green{color:var(--green);} .stat-card .value.amber{color:var(--amber);}

  .progress-track{height:8px; background:var(--border); border-radius:5px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--accent); border-radius:5px; transition:width .3s;}

  .card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:20px 22px; margin-bottom:16px;}
  .card h3{font-size:15px; font-weight:700; margin-bottom:14px; color:var(--navy);}
  .card-head-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .card-head-row h3{margin-bottom:0;}

  .module-row{display:flex; align-items:center; gap:14px; padding:13px 0; border-bottom:1px solid var(--border);}
  .module-row:last-child{border-bottom:none;}
  .module-num{width:30px; height:30px; border-radius:50%; background:var(--accent-light); color:var(--accent); font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .module-num.done{background:var(--green-bg); color:var(--green);}
  .module-info{flex:1; min-width:0;}
  .module-info .title{font-size:14px; font-weight:600;}
  .module-info .meta{font-size:12px; color:var(--muted); margin-top:2px;}
  .badge{display:inline-block; padding:3px 9px; border-radius:6px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.03em; white-space:nowrap;}
  .badge.done{background:var(--green-bg); color:var(--green);}
  .badge.pending{background:var(--amber-bg); color:var(--amber);}
  .badge.upcoming{background:#EEF0F3; color:var(--muted);}
  .badge.overdue{background:var(--red-bg); color:var(--red);}
  .badge.review{background:var(--accent-light); color:var(--accent);}
  .badge.inactive{background:#EEF0F3; color:var(--muted);}

  .emp-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; margin-bottom:14px; display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .emp-card .clickzone{display:flex; align-items:center; gap:16px; flex:1; cursor:pointer; min-width:240px;}
  .avatar{width:42px; height:42px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;}
  .emp-info{flex:1;}
  .emp-info .name{font-weight:700; font-size:15px;}
  .emp-info .role{font-size:12px; color:var(--muted);}
  .emp-progress{width:160px;}
  .emp-progress .pct{font-size:12px; color:var(--muted); margin-bottom:4px; display:flex; justify-content:space-between;}

  .modal-overlay{position:fixed; inset:0; background:rgba(20,30,50,0.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; overflow-y:auto;}
  .modal{background:#fff; border-radius:var(--radius-lg); padding:26px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto;}
  .modal h3{font-size:17px; font-weight:700; color:var(--navy); margin-bottom:4px;}
  .modal .sub{font-size:13px; color:var(--muted); margin-bottom:18px;}
  .modal-actions{display:flex; gap:10px; margin-top:20px; justify-content:flex-end; flex-wrap:wrap;}
  textarea{width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; resize:vertical; min-height:80px;}
  .form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .form-grid .full{grid-column:1/-1;}

  .empty{text-align:center; padding:50px 20px; color:var(--muted);}
  .empty .big{font-size:32px; margin-bottom:10px;}

  .tabs{display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:22px; flex-wrap:wrap;}
  .tab{padding:10px 16px; font-size:13px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; background:none; border-top:none; border-left:none; border-right:none;}
  .tab.active{color:var(--navy); border-bottom-color:var(--navy);}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:11px 20px; border-radius:8px; font-size:13px; font-weight:500; z-index:200; box-shadow:0 4px 16px rgba(0,0,0,0.2); max-width:90vw; text-align:center;}
  .toast.error{background:var(--red);}

  table.log-table{width:100%; border-collapse:collapse; font-size:13px;}
  table.log-table th{text-align:left; padding:9px 10px; background:var(--bg); color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; border-bottom:1px solid var(--border);}
  table.log-table td{padding:10px 10px; border-bottom:1px solid var(--border); vertical-align:top;}
  table.log-table tr:last-child td{border-bottom:none;}

  .icon-btn{background:none; border:none; color:var(--muted); padding:6px 8px; border-radius:6px; font-size:13px;}
  .icon-btn:hover{background:var(--bg); color:var(--text);}

  .spinner{width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-screen{display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:14px; color:var(--muted); font-size:13px;}

  @media (max-width:640px){
    .container{padding:18px 14px 50px;}
    .emp-progress{width:100%;}
    .form-grid{grid-template-columns:1fr;}
  }
</style>

function addMonths(dateStr, n){
  const d = new Date(dateStr+"T00:00:00");
  d.setMonth(d.getMonth()+n);
  return d.toISOString().slice(0,10);
}
function addDays(dateStr, n){
  const d = new Date(dateStr+"T00:00:00");
  d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
// Module i (0-based) due date: 2 modules per month, second one 14 days after the first.
// Module 0 -> start+0mo+0d, Module 1 -> start+0mo+14d, Module 2 -> start+1mo+0d, Module 3 -> start+1mo+14d, ...
function dueDateForModule(startDate, zeroBasedIndex){
  const monthOffset = Math.floor(zeroBasedIndex/2);
  const isSecondInMonth = (zeroBasedIndex % 2) === 1;
  const base = addMonths(startDate, monthOffset);
  return isSecondInMonth ? addDays(base, 14) : base;
}
function fmtDate(dateStr){
  if(!dateStr) return "-";
  const d = new Date(dateStr+"T00:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function initials(name){ return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }

function showToast(msg, isError){
  const t = document.createElement("div");
  t.className = "toast" + (isError ? " error" : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

// ================= DATA LAYER (Supabase) =================
async function dbGetSupervisorPassword(){
  const {data, error} = await sb.from("supervisor").select("password").eq("id",1).single();
  if(error){ console.error(error); return null; }
  return data.password;
}
async function dbSetSupervisorPassword(newPass){
  const {error} = await sb.from("supervisor").update({password:newPass}).eq("id",1);
  if(error){ showToast("Failed to update password", true); return false; }
  return true;
}
async function dbGetEmployeeByUsername(username){
  const {data, error} = await sb.from("employees").select("*").eq("username", username).eq("active", true).maybeSingle();
  if(error){ console.error(error); return null; }
  return data;
}
async function dbGetAllEmployees(){
  const {data, error} = await sb.from("employees").select("*").order("created_at", {ascending:true});
  if(error){ console.error(error); return []; }
  return data;
}
async function dbGetModules(employeeId){
  const {data, error} = await sb.from("modules").select("*").eq("employee_id", employeeId).order("module_index", {ascending:true});
  if(error){ console.error(error); return []; }
  return data;
}
async function dbCreateEmployeeWithModules(emp){
  const {data, error} = await sb.from("employees").insert({
    username: emp.username, password: emp.password, name: emp.name,
    role: emp.role, start_date: emp.startDate, email: emp.email || null, active: true
  }).select().single();
  if(error){ showToast(error.message.includes("duplicate") ? "Username already taken" : "Failed to create employee", true); return null; }

  const modules = CURRICULUM.map((title,i)=>({
    employee_id: data.id,
    module_index: i+1,
    title,
    due_date: dueDateForModule(emp.startDate, i),
    status: "upcoming"
  }));
  const {error: modErr} = await sb.from("modules").insert(modules);
  if(modErr){ showToast("Employee created but modules failed", true); console.error(modErr); }
  return data;
}
async function dbUpdateEmployee(id, fields){
  const {error} = await sb.from("employees").update(fields).eq("id", id);
  if(error){ showToast("Update failed: "+error.message, true); return false; }
  return true;
}
async function dbDeleteEmployee(id){
  const {error} = await sb.from("employees").delete().eq("id", id);
  if(error){ showToast("Delete failed", true); return false; }
  return true;
}
async function dbUpdateModule(id, fields){
  const {error} = await sb.from("modules").update(fields).eq("id", id);
  if(error){ showToast("Update failed", true); return false; }
  return true;
}
async function dbSetModuleVideoUrl(moduleId, url){
  const {error} = await sb.from("modules").update({video_url: url || null}).eq("id", moduleId);
  if(error){ showToast("Failed to save link", true); return false; }
  return true;
}
async function dbBulkSetVideoUrls(employeeId, urlsByIndex){
  const updates = Object.entries(urlsByIndex).map(([idx, url]) =>
    sb.from("modules").update({video_url: url || null}).eq("employee_id", employeeId).eq("module_index", parseInt(idx))
  );
  await Promise.all(updates);
}
async function dbBulkSetVideoUrlsAllEmployees(urlsByIndex){
  const emps = await dbGetAllEmployees();
  for(const emp of emps){
    await dbBulkSetVideoUrls(emp.id, urlsByIndex);
  }
}
async function dbResetEmployeeProgress(employeeId, startDate){
  const modules = CURRICULUM.map((title,i)=>({
    module_index: i+1, due_date: dueDateForModule(startDate, i),
    status: "upcoming", reflection: null, completed_date: null,
    supervisor_signoff: false, signoff_date: null
  }));
  for(const m of modules){
    await sb.from("modules").update({
      due_date: m.due_date, status: m.status, reflection: m.reflection,
      completed_date: m.completed_date, supervisor_signoff: m.supervisor_signoff, signoff_date: m.signoff_date
    }).eq("employee_id", employeeId).eq("module_index", m.module_index);
  }
}

async function loadEmployeesWithModules(){
  const emps = await dbGetAllEmployees();
  const full = [];
  for(const e of emps){
    const modules = await dbGetModules(e.id);
    full.push({...e, modules});
  }
  EMPLOYEES_CACHE = full;
  return full;
}

// ---------- Derived stats ----------
function empStats(emp){
  const total = emp.modules.length || 40;
  const completed = emp.modules.filter(m=>m.status==="completed").length;
  const pending = emp.modules.filter(m=>m.status==="pending_review").length;
  const overdue = emp.modules.filter(m=> m.status!=="completed" && m.due_date < todayStr()).length;
  const pct = total ? Math.round((completed/total)*100) : 0;
  return {total, completed, pending, overdue, pct};
}
function moduleStatusBadge(m){
  if(m.status==="completed") return `<span class="badge done">Completed</span>`;
  if(m.status==="pending_review") return `<span class="badge review">Awaiting sign-off</span>`;
  if(m.due_date < todayStr()) return `<span class="badge overdue">Overdue</span>`;
  return `<span class="badge upcoming">Upcoming</span>`;
}

  const fieldsEl = document.getElementById("loginFields");
  const errEl = document.getElementById("loginError");

      fieldsEl.innerHTML = `
        <div class="field"><label>Username</label><input type="text" id="empUser" placeholder="e.g. jsmith" /></div>
        <div class="field"><label>Password</label><input type="password" id="empPass" placeholder="Enter password" /></div>
      `;
    } else {
      fieldsEl.innerHTML = `
        <div class="field"><label>Supervisor password</label><input type="password" id="supPass" placeholder="Enter password" /></div>
      `;
    }
  }
  renderFields();

  document.getElementById("roleEmp").onclick = ()=>{ role="employee"; document.getElementById("roleEmp").classList.add("active"); document.getElementById("roleSup").classList.remove("active"); renderFields(); };
  document.getElementById("roleSup").onclick = ()=>{ role="supervisor"; document.getElementById("roleSup").classList.add("active"); document.getElementById("roleEmp").classList.remove("active"); renderFields(); };

  document.getElementById("loginBtn").onclick = async ()=>{
    const btn = document.getElementById("loginBtn");
    btn.textContent = "Signing in..."; btn.disabled = true;
    try{
      if(role==="employee"){
        const username = document.getElementById("empUser").value.trim();
        const password = document.getElementById("empPass").value;
        const emp = await dbGetEmployeeByUsername(username);
        if(!emp || emp.password !== password){
          errEl.textContent = "Incorrect username or password.";
          errEl.style.display = "block";
        } else {
          emp.modules = await dbGetModules(emp.id);
          CURRENT_USER = {role:"employee", employee: emp};
          activeTab = "videos";
          render();
        }
      } else {
        const pass = document.getElementById("supPass").value;
        const realPass = await dbGetSupervisorPassword();
        if(pass === realPass){
          CURRENT_USER = {role:"supervisor", employee:null};
          activeTab = "overview";
          await loadEmployeesWithModules();
          render();
        } else {
          errEl.textContent = "Incorrect password.";
          errEl.style.display = "block";
        }
      }
    } catch(e){
      console.error(e);
      errEl.textContent = "Connection error. Check your internet connection and try again.";
      errEl.style.display = "block";
    } finally {
      btn.textContent = "Sign in"; btn.disabled = false;
    }
  };
}

function endOfCurrentMonth(){
  const now = new Date();
  const d = new Date(now.getFullYear(), now.getMonth()+1, 0); // last day of this month
  return d.toISOString().slice(0,10);
}
function isModuleVisibleToEmployee(m){
  return m.due_date <= endOfCurrentMonth();
}

async function renderEmployeeView(){
  const emp = CURRENT_USER.employee;
  emp.modules = await dbGetModules(emp.id);
  const stats = empStats(emp);
  const visibleModules = emp.modules.filter(isModuleVisibleToEmployee);
  const hiddenCount = emp.modules.length - visibleModules.length;

  root.innerHTML = `
    ${renderTopbar("Training Portal")}
    <div class="container">
      <div class="page-head">
        <div><h2>Hi, ${emp.name}</h2><div class="desc">${emp.role} &middot; STEM OPT start: ${fmtDate(emp.start_date)}</div></div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="label">Overall progress</div><div class="value">${stats.pct}%</div></div>
        <div class="stat-card"><div class="label">Completed</div><div class="value green">${stats.completed} / ${stats.total}</div></div>
        <div class="stat-card"><div class="label">Awaiting sign-off</div><div class="value amber">${stats.pending}</div></div>
        <div class="stat-card"><div class="label">Overdue</div><div class="value ${stats.overdue>0?'amber':''}">${stats.overdue}</div></div>
      </div>
      <div class="card"><h3>Overall completion</h3><div class="progress-track"><div class="progress-fill" style="width:${stats.pct}%"></div></div></div>
      <div class="card">
        <h3>Your training modules</h3>
        <div id="moduleList"></div>
        ${hiddenCount > 0 ? `<p style="font-size:12px; color:var(--muted); margin-top:14px;">${hiddenCount} upcoming module(s) will appear here as their assigned month arrives.</p>` : ""}
      </div>
    </div>
  `;

  const list = document.getElementById("moduleList");
  if(visibleModules.length===0){
    list.innerHTML = `<div class="empty" style="padding:30px 10px;">No modules due yet. Check back soon.</div>`;
  }
  visibleModules.forEach(m=>{
    const row = document.createElement("div");
    row.className = "module-row";
    row.style.flexWrap = "wrap";
    row.innerHTML = `
      <div class="module-num ${m.status==='completed'?'done':''}">${m.module_index}</div>
      <div class="module-info">
        <div class="title">${m.title}</div>
        <div class="meta">Due ${fmtDate(m.due_date)}${m.completed_date ? ' &middot; Completed '+fmtDate(m.completed_date):''}${m.status==='pending_review' ? ' &middot; Pending supervisor review':''}${m.status==='completed' && m.signoff_date ? ' &middot; Signed off '+fmtDate(m.signoff_date):''}</div>
        ${m.reflection ? `<div style="margin-top:8px; padding:10px 12px; background:var(--bg); border-radius:8px; font-size:13px; color:var(--text); border-left:3px solid var(--accent);"><strong style="font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted); display:block; margin-bottom:4px;">Your summary</strong>${m.reflection}</div>` : ""}
      </div>
      <div>${moduleStatusBadge(m)}</div>
      <div style="display:flex; gap:8px;">
        ${m.video_url ? `<a href="${m.video_url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary btn-sm" style="text-decoration:none;">Watch video</a>` : `<span style="font-size:11px; color:var(--muted); white-space:nowrap;">Link coming soon</span>`}
        ${m.status==="upcoming" ? `<button class="btn btn-primary btn-sm" data-id="${m.id}">Mark watched</button>` : ""}
      </div>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll("button[data-id]").forEach(btn=>{
    btn.onclick = ()=> openReflectionModal(btn.dataset.id);
  });
  wireLogout();
}

function openReflectionModal(moduleId){
  const emp = CURRENT_USER.employee;
  const m = emp.modules.find(x=>x.id===moduleId);
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <h3>Module ${m.module_index}: ${m.title}</h3>
      <div class="sub">Briefly describe what you learned and how it applies to your work. This is reviewed by your supervisor as part of your I-983 training record.</div>
      <div class="field"><label>Reflection / summary</label><textarea id="reflectionText" placeholder="e.g. This module covered... I plan to apply this by..."></textarea></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="submitBtn" style="width:auto;">Submit for review</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById("cancelBtn").onclick = ()=> overlay.remove();
  document.getElementById("submitBtn").onclick = async ()=>{
    const text = document.getElementById("reflectionText").value.trim();
    if(text.length < 10){ showToast("Please add a short reflection before submitting", true); return; }
    const ok = await dbUpdateModule(m.id, {status:"pending_review", reflection:text, completed_date: todayStr()});
    if(ok){ overlay.remove(); showToast("Submitted. Awaiting supervisor sign-off."); renderEmployeeView(); }
  };
}

function renderOverviewTab(content){
  if(EMPLOYEES_CACHE.length===0){
    content.innerHTML = `<div class="card"><div class="empty"><div class="big">+</div>No employees yet. Click "Add employee" to get started.</div></div>`;
    return;
  }
  let html = "";
  EMPLOYEES_CACHE.forEach(emp=>{
    const stats = empStats(emp);
    html += `
      <div class="emp-card">
        <div class="clickzone" data-emp="${emp.id}">
          <div class="avatar">${initials(emp.name)}</div>
          <div class="emp-info">
            <div class="name">${emp.name} ${!emp.active ? '<span class="badge inactive">Inactive</span>':''}</div>
            <div class="role">${emp.role} &middot; Started ${fmtDate(emp.start_date)} &middot; @${emp.username}</div>
          </div>
          <div class="emp-progress">
            <div class="pct"><span>${stats.completed}/${stats.total} modules</span><span>${stats.pct}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${stats.pct}%"></div></div>
          </div>
          ${stats.pending>0 ? `<span class="badge review">${stats.pending} to review</span>` : ""}
          ${stats.overdue>0 ? `<span class="badge overdue">${stats.overdue} overdue</span>` : ""}
        </div>
        <button class="icon-btn" data-edit="${emp.id}">Edit</button>
      </div>
    `;
  });
  content.innerHTML = html;
  content.querySelectorAll(".clickzone").forEach(c=> c.onclick = ()=> openEmployeeDetail(c.dataset.emp));
  content.querySelectorAll("[data-edit]").forEach(b=> b.onclick = (e)=>{ e.stopPropagation(); openEmployeeForm(b.dataset.edit); });
}

function renderReviewTab(content){
  const pendingItems = [];
  EMPLOYEES_CACHE.forEach(emp=> emp.modules.filter(m=>m.status==="pending_review").forEach(m=> pendingItems.push({emp,m})));

  if(pendingItems.length===0){
    content.innerHTML = `<div class="card"><div class="empty"><div class="big">&#10003;</div>All caught up &mdash; no modules awaiting review.</div></div>`;
    return;
  }
  content.innerHTML = `<div class="card"><h3>Modules awaiting your sign-off (${pendingItems.length})</h3><div id="reviewList"></div></div>`;
  const list = document.getElementById("reviewList");
  pendingItems.forEach(({emp,m})=>{
    const row = document.createElement("div");
    row.className = "module-row";
    row.innerHTML = `
      <div class="module-num">${m.module_index}</div>
      <div class="module-info">
        <div class="title">${emp.name} &mdash; ${m.title}</div>
        <div class="meta">Submitted ${fmtDate(m.completed_date)} &middot; "${(m.reflection||"").slice(0,90)}${(m.reflection||"").length>90?'...':''}"</div>
      </div>
      <button class="btn btn-primary btn-sm" data-mod="${m.id}">Sign off</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll("button[data-mod]").forEach(btn=>{
    btn.onclick = async ()=>{
      btn.disabled = true; btn.textContent = "Saving...";
      const ok = await dbUpdateModule(btn.dataset.mod, {status:"completed", supervisor_signoff:true, signoff_date: todayStr()});
      if(ok){ showToast("Signed off"); renderSupervisorView(); }
    };
  });
}

let contentSelectedEmpIds = []; // employees currently targeted by the content tab

function renderContentTab(content){
  if(EMPLOYEES_CACHE.length===0){
    content.innerHTML = `<div class="card"><div class="empty"><div class="big">&#9888;</div>Add at least one employee first, then come back here to attach video links.</div></div>`;
    return;
  }
  // default selection: all employees, first time only
  if(contentSelectedEmpIds.length===0){
    contentSelectedEmpIds = EMPLOYEES_CACHE.map(e=>e.id);
  }
  // keep selection valid if an employee was deleted
  contentSelectedEmpIds = contentSelectedEmpIds.filter(id=> EMPLOYEES_CACHE.some(e=>e.id===id));

  const selectedEmps = EMPLOYEES_CACHE.filter(e=>contentSelectedEmpIds.includes(e.id));
  // Reference list of titles/links: use the first selected employee, or first overall if none selected
  const reference = selectedEmps[0] || EMPLOYEES_CACHE[0];
  const linkedCount = reference.modules.filter(m=>m.video_url).length;

  content.innerHTML = `
    <div class="card">
      <h3>Apply to which employee(s)?</h3>
      <p style="font-size:13px; color:var(--muted); margin-bottom:12px;">Choose one, several, or all employees. Video links and title edits below will only apply to the employees you select here.</p>
      <div id="empCheckboxes" style="display:flex; flex-direction:column; gap:8px; margin-bottom:10px;"></div>
      <div style="display:flex; gap:10px;">
        <button class="icon-btn" id="selectAllBtn" style="border:1px solid var(--border);">Select all</button>
        <button class="icon-btn" id="selectNoneBtn" style="border:1px solid var(--border);">Clear selection</button>
      </div>
    </div>

    <div class="card">
      <div class="card-head-row"><h3>Bulk-add video links</h3><span style="font-size:12px; color:var(--muted);">${linkedCount}/40 linked for ${reference.name}</span></div>
      <p style="font-size:13px; color:var(--muted); margin-bottom:12px;">Paste one link per line, in module order (1 to 40). Applies only to the employee(s) selected above. Leave a line blank to skip a module.</p>
      <textarea id="bulkLinks" style="min-height:160px; font-family:monospace; font-size:12px;" placeholder="https://...module-1-link
https://...module-2-link
https://...module-3-link
..."></textarea>
      <div class="modal-actions" style="justify-content:flex-end;">
        <button class="btn btn-primary" id="saveBulkBtn" style="width:auto;">Save all links to selected employee(s)</button>
      </div>
    </div>

    <div class="card">
      <h3>Edit individual modules</h3>
      <p style="font-size:13px; color:var(--muted); margin-bottom:6px;">Titles and links shown below are from <strong>${reference.name}</strong>. Edits apply to whichever employee(s) you have selected above.</p>
      <div id="moduleLinkList"></div>
    </div>
  `;

  // Render employee checkboxes
  const cbWrap = document.getElementById("empCheckboxes");
  EMPLOYEES_CACHE.forEach(e=>{
    const row = document.createElement("label");
    row.style.cssText = "display:flex; align-items:center; gap:10px; font-size:13px; cursor:pointer;";
    row.innerHTML = `<input type="checkbox" data-emp="${e.id}" ${contentSelectedEmpIds.includes(e.id)?'checked':''} style="width:auto;"/> ${e.name} <span style="color:var(--muted);">(@${e.username})</span>`;
    cbWrap.appendChild(row);
  });
  cbWrap.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.onchange = ()=>{
      const id = cb.dataset.emp;
      if(cb.checked){ if(!contentSelectedEmpIds.includes(id)) contentSelectedEmpIds.push(id); }
      else { contentSelectedEmpIds = contentSelectedEmpIds.filter(x=>x!==id); }
      renderContentTab(content);
    };
  });
  document.getElementById("selectAllBtn").onclick = ()=>{ contentSelectedEmpIds = EMPLOYEES_CACHE.map(e=>e.id); renderContentTab(content); };
  document.getElementById("selectNoneBtn").onclick = ()=>{ contentSelectedEmpIds = []; renderContentTab(content); };

  document.getElementById("saveBulkBtn").onclick = async ()=>{
    if(contentSelectedEmpIds.length===0){ showToast("Select at least one employee first", true); return; }
    const lines = document.getElementById("bulkLinks").value.split("\n");
    const urlsByIndex = {};
    lines.forEach((line, i)=>{
      if(i < 40){
        const trimmed = line.trim();
        if(trimmed) urlsByIndex[i+1] = trimmed;
      }
    });
    if(Object.keys(urlsByIndex).length===0){ showToast("Paste at least one link first", true); return; }
    const btn = document.getElementById("saveBulkBtn");
    btn.disabled = true; btn.textContent = "Saving...";
    for(const empId of contentSelectedEmpIds){
      await dbBulkSetVideoUrls(empId, urlsByIndex);
    }
    showToast(`Saved ${Object.keys(urlsByIndex).length} link(s) to ${contentSelectedEmpIds.length} employee(s)`);
    renderSupervisorView();
  };

  const list = document.getElementById("moduleLinkList");
  reference.modules.forEach(m=>{
    const row = document.createElement("div");
    row.className = "module-row";
    row.innerHTML = `
      <div class="module-num ${m.video_url ? 'done':''}">${m.module_index}</div>
      <div class="module-info">
        <div class="title">${m.title}</div>
        <div class="meta" style="word-break:break-all;">${m.video_url ? m.video_url : 'No link set'}</div>

    `;
    list.appendChild(row);
  });
  list.querySelectorAll("button[data-idx]").forEach(btn=>{
    btn.onclick = ()=> openModuleEditor(parseInt(btn.dataset.idx), btn.dataset.title, btn.dataset.link);
  });
}

function openModuleEditor(moduleIndex, title, link){
  if(contentSelectedEmpIds.length===0){ showToast("Select at least one employee first", true); return; }
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <h3>Module ${moduleIndex}</h3>
      <div class="sub">Changes apply to ${contentSelectedEmpIds.length} selected employee(s).</div>
      <div class="field"><label>Module title</label><input type="text" id="editTitleInput" value="${title.replace(/&quot;/g,'"')}" /></div>
      <div class="field"><label>Video URL</label><input type="text" id="editLinkInput" value="${link.replace(/&quot;/g,'"')}" placeholder="https://..." /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn btn-primary" id="saveBtn" style="width:auto;">Save changes</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById("cancelBtn").onclick = ()=> overlay.remove();
  document.getElementById("saveBtn").onclick = async ()=>{
    const newTitle = document.getElementById("editTitleInput").value.trim();
    const newLink = document.getElementById("editLinkInput").value.trim();
    if(!newTitle){ showToast("Title can't be empty", true); return; }
    const btn = document.getElementById("saveBtn");
    btn.disabled = true; btn.textContent = "Saving...";
    for(const empId of contentSelectedEmpIds){
      await sb.from("modules").update({title:newTitle, video_url:newLink||null}).eq("employee_id", empId).eq("module_index", moduleIndex);
    }
    showToast("Module updated");
    overlay.remove();
    renderSupervisorView();
  };
}

      <h3>Change supervisor password</h3>

  document.getElementById("saveSupPass").onclick = async ()=>{

  };
}

// ---------- Add / Edit employee form (full admin control) ----------
function openEmployeeForm(empId){
  const isEdit = !!empId;
  const emp = isEdit ? EMPLOYEES_CACHE.find(e=>e.id===empId) : null;
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.innerHTML = `
    <div class="modal">
      <h3>${isEdit ? "Edit employee" : "Add new employee"}</h3>
      <div class="sub">${isEdit ? "Update profile details, reset their password, or deactivate them." : "Creates a profile and assigns the full 40-module curriculum based on their start date."}</div>
      <div class="form-grid">
        <div class="field full"><label>Full name</label><input type="text" id="fName" value="${isEdit?emp.name:''}" placeholder="e.g. Priya Sharma" /></div>
        <div class="field full"><label>Email address</label><input type="email" id="fEmail" value="${isEdit?(emp.email||''):''}" placeholder="e.g. priya.sharma@example.com" /></div>
        <div class="field"><label>Username (for login)</label><input type="text" id="fUser" value="${isEdit?emp.username:''}" placeholder="e.g. psharma" /></div>
        <div class="field"><label>${isEdit ? "Reset password" : "Password"}</label><input type="text" id="fPass" placeholder="${isEdit ? 'Leave blank to keep current' : 'Set initial password'}" /></div>
        <div class="field"><label>Job title / role</label><input type="text" id="fRole" value="${isEdit?emp.role:'Java/J2EE Developer'}" /></div>
        <div class="field"><label>STEM OPT start date</label><input type="date" id="fStart" value="${isEdit?emp.start_date:''}" /></div>
        ${isEdit ? `<div class="field"><label>Status</label><select id="fActive"><option value="true" ${emp.active?'selected':''}>Active</option><option value="false" ${!emp.active?'selected':''}>Inactive</option></select></div>` : ""}
      </div>
      ${isEdit ? `<div class="field" style="margin-top:8px;"><label><input type="checkbox" id="fReset" style="width:auto; margin-right:6px;"/>Reset all training progress (re-generates schedule from start date, clears completions)</label></div>` : ""}
      <div class="modal-actions" style="justify-content:space-between;">
        <div>${isEdit ? `<button class="btn btn-danger btn-sm" id="deleteBtn" type="button">Delete employee</button>` : ""}</div>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary" id="cancelBtn" type="button">Cancel</button>
          <button class="btn btn-primary" id="saveBtn" style="width:auto;" type="button">${isEdit?"Save changes":"Create employee"}</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById("cancelBtn").onclick = ()=> overlay.remove();

  if(isEdit){
    document.getElementById("deleteBtn").onclick = async ()=>{
      if(!confirm(`Permanently delete ${emp.name} and all their training records? This cannot be undone.`)) return;
      const ok = await dbDeleteEmployee(emp.id);
      if(ok){ showToast("Employee deleted"); overlay.remove(); renderSupervisorView(); }
    };
  }

  document.getElementById("saveBtn").onclick = async ()=>{
    const name = document.getElementById("fName").value.trim();
    const email = document.getElementById("fEmail").value.trim();
    const username = document.getElementById("fUser").value.trim();
    const pass = document.getElementById("fPass").value;
    const roleVal = document.getElementById("fRole").value.trim();
    const start = document.getElementById("fStart").value;

    if(!name || !username || !start || (!isEdit && !pass)){
      showToast("Please fill in all required fields", true); return;
    }
    if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
      showToast("Please enter a valid email address", true); return;
    }

    const saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled = true; saveBtn.textContent = "Saving...";

    if(isEdit){
      const fields = {name, email: email||null, username, role: roleVal, start_date: start, active: document.getElementById("fActive").value === "true"};
      if(pass) fields.password = pass;
      const ok = await dbUpdateEmployee(emp.id, fields);
      if(ok){
        const doReset = document.getElementById("fReset").checked;
        if(doReset) await dbResetEmployeeProgress(emp.id, start);
        showToast("Employee updated"); overlay.remove(); renderSupervisorView();
      } else { saveBtn.disabled=false; saveBtn.textContent="Save changes"; }
    } else {
      const created = await dbCreateEmployeeWithModules({name, email, username, password:pass, role:roleVal, startDate:start});
      if(created){ showToast("Employee created"); overlay.remove(); renderSupervisorView(); }
      else { saveBtn.disabled=false; saveBtn.textContent="Create employee"; }
    }
  };
}

// ---------- CSV export ----------
function csvEscape(s){ if(s==null) return ""; return `"${String(s).replace(/"/g,'""')}"`; }
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function exportEmployeeCSV(emp){
  const rows = [["Employee","Role","Start Date","Module #","Topic","Due Date","Status","Completed Date","Supervisor Signoff Date","Reflection"]];
  emp.modules.forEach(m=> rows.push([emp.name, emp.role, emp.start_date, m.module_index, m.title, m.due_date, m.status, m.completed_date||"", m.signoff_date||"", m.reflection||""]));
  downloadCSV(`Adiroha_${emp.name.replace(/\s+/g,'_')}_Training_Transcript.csv`, rows);
  showToast("Transcript exported");
}
function exportCompanyCSV(){
  const rows = [["Employee","Role","Start Date","Module #","Topic","Due Date","Status","Completed Date","Supervisor Signoff Date","Reflection"]];
  EMPLOYEES_CACHE.forEach(emp=> emp.modules.forEach(m=> rows.push([emp.name, emp.role, emp.start_date, m.module_index, m.title, m.due_date, m.status, m.completed_date||"", m.signoff_date||"", m.reflection||""])));
  downloadCSV(`Adiroha_Company_Training_Log_${todayStr()}.csv`, rows);
  showToast("Company-wide log exported");
}

  if(!CURRENT_USER){ renderLogin(); return; }
  if(CURRENT_USER.role==="employee") renderEmployeeView();
  else renderSupervisorView();
}

</script>
